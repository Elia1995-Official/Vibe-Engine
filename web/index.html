<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Vibe Engine Web</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #070b17;
        color: #d6e6ff;
        font-family: "Segoe UI", Tahoma, sans-serif;
      }

      #vibe_web_canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      .fallback {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        opacity: 0.82;
      }
    </style>
  </head>
  <body>
    <canvas id="vibe_web_canvas"></canvas>
    <noscript>
      <div class="fallback">JavaScript is required to run the WASM build.</div>
    </noscript>
    <link data-trunk rel="rust" data-bin="vibe-web" />
  </body>
</html>
